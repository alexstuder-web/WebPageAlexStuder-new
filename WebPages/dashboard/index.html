<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAPT Dashboard — umgezogen</title>
  <script src="../../js/app-router.js"></script>
  <script>
    // Leitet auf den RAPT-Container weiter — Hostname-abhängig (lokal vs. VPS).
    const target = window.appUrl('rapt');
    if (target) location.replace(target);
  </script>
</head>
<body>
  <p>Das RAPT Dashboard läuft jetzt als eigene App.
     Falls die Weiterleitung nicht funktioniert:
     <a href="/" id="back">zurück zur Hauptseite</a>.</p>
</body>
</html>
